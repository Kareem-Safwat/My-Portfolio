<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--? Main Css Files -->
    <link rel="stylesheet" href="css/farmework.css" />
    <link rel="stylesheet" href="css/master.css" />
    <!--? Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <!--? Font Awesome Library -->
    <link rel="stylesheet" href="css/all.min.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <div class="page d-flex">
      <div class="sidebar bg-wight p-20 p-relative">
        <h3 class="p-relative txt-c mt-0">Template | 4</h3>
        <ul>
          <!--! Dashboard -->
          <li>
            <a
              class="active d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-regular fa-chart-bar"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <!--! Settings -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-solid fa-gear"></i>
              <span>Settings</span>
            </a>
          </li>
          <!--! Profile -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-regular fa-user"></i>
              <span>Profile</span>
            </a>
          </li>
          <!--! Projects -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-solid fa-diagram-project"></i>
              <span>Projects</span>
            </a>
          </li>
          <!--! Courses -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-solid fa-graduation-cap"></i>
              <span>Courses</span>
            </a>
          </li>
          <!--! Friends -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-regular fa-circle-user"></i>
              <span>Friends</span>
            </a>
          </li>
          <!--! Files -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-regular fa-file"></i>
              <span>Files</span>
            </a>
          </li>
          <!--! Plans -->
          <li>
            <a
              class="d-flex align-center fs-14 c-black red-6 p-10"
              href="index.html"
            >
              <i class="fa-regular fa-credit-card"></i>
              <span>Plans</span>
            </a>
          </li>
        </ul>
      </div>
      <div class="content w-full">
        <!--? Start Content -->
        <div class="head bg-wight p-15 between-flex">
          <div class="search p-relative">
            <input class="p-10" type="search" placeholder="Type A Keyword...">
          </div>
          <div class="icons d-flex align-center">
            <span class="notification p-relative">
              <i class="fa-regular fa-bell fa-lg"></i>
            </span>
            <img src="imgs/avatar.png" alt="" />
          </div>
        </div>
        <!--? End Content -->
        <!--? Start Welcome Widget -->
        <h1 class="p-relative">Dashboard</h1>
        <div class="wrapper d-grid gap-20">
          <div class="welcome bg-wight rad-10 txt-c-mobile block-mobile">
            <div class="intro p-20 d-flex between-flex bg-eee">
              <div>
                <h2 class="m-0">Welcome</h2>
                <p class="c-grey mt-5">Kareem</p>
              </div>
              <img class="hide-mobile" src="imgs/welcome.png" alt="">
            </div>
            <img src="imgs/avatar.png" alt="avatar" class="avatar">
            <div class="body txt-c d-flex p-20 mb-20 block-mobile">
                <div>Kareem Safwat<span class="d-block c-grey fs-14 mt-10">Developer</span></div>
                <div>80<span class="d-block c-grey fs-14 mt-10">Projects</span></div>
                <div>$8500<span class="d-block c-grey fs-14 mt-10">Earned</span></div>
            </div>
            <a href="profile.html" class="visit d-block fs-14 red-6 bg-blue c-wight w-fit">Profile</a>
          </div>
          <!--? End Welcome Widget -->
          <!--? Start Draft Widget -->
          
          <!--? End Draft Widget -->
        </div>
      </div>
    </div>
  </body>
</html>
